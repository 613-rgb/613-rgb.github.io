
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJU Mobile ID - An Sumin</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f2f4f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .card {
            width: 100%;
            max-width: 350px;
            background: linear-gradient(145deg, #C3002F 0%, #900022 100%);
            border-radius: 24px;
            padding: 25px;
            color: white;
            box-shadow: 0 15px 30px rgba(195, 0, 47, 0.25);
            position: relative;
            margin-bottom: 25px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .card::after {
            content: "";
            position: absolute;
            top: -20px;
            right: -20px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .univ-header {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 4px;
            opacity: 0.9;
        }

        .card-type {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .profile-layout {
            display: flex;
            gap: 22px;
            margin-bottom: 25px;
        }

        .photo-frame {
            width: 105px;
            height: 135px;
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .label {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 1px;
        }

        .value-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .value-sub {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .footer-info {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .qr-section {
            width: 100%;
            max-width: 350px;
            background: white;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            box-sizing: border-box;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #2e7d32;
            font-weight: 700;
            font-size: 13px;
            background: #e8f5e9;
            padding: 5px 12px;
            border-radius: 50px;
            margin-bottom: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #4caf50;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .qr-image-wrapper {
            width: 170px;
            height: 170px;
            margin: 0 auto 15px;
            padding: 10px;
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
        }

        .qr-image-wrapper img {
            width: 100%;
            height: 100%;
        }

        .timer-text {
            color: #C3002F;
            font-weight: 700;
            font-size: 14px;
        }

        .refresh-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            background: #f5f5f7;
            border-radius: 12px;
            font-weight: 700;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="univ-header">SEJONG UNIVERSITY</div>
        <div class="card-type">모바일 학생증</div>

        <div class="profile-layout">
            <div class="photo-frame">
                <img src="me.jpg" alt="Profile" onerror="this.src='https://via.placeholder.com/105x135/ffffff/C3002F?text=SJU'">
            </div>
            <div class="info-content">
                <div class="label">성명</div>
                <div class="value-name">안수민</div>
                
                <div class="label">생년월일</div>
                <div class="value-sub">2003/10/09</div>
                
                <div class="label">유효기간</div>
                <div class="value-sub" style="opacity:0.9">09/2025 ~ 09/2026</div>
            </div>
        </div>

        <div class="footer-info">
            <div><span style="opacity:0.6; font-size:11px;">학과</span><br>컴퓨터공학과</div>
            <div style="text-align: right;"><span style="opacity:0.6; font-size:11px;">구분</span><br>학부생</div>
        </div>
    </div>

    <div class="qr-section">
        <div class="status-indicator">
            <div class="status-dot"></div>
            인증됨 (사용 가능)
        </div>
        
        <div class="qr-image-wrapper">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=SJU-ID-AN-SUMIN-VALID-2026" alt="QR Code">
        </div>
        
        <div class="timer-text" id="timer">남은 시간 00:30</div>
        
        <button class="refresh-btn" onclick="location.reload()">데이터 새로고침</button>
    </div>

    <script>
        let count = 30;
        const timerElement = document.getElementById('timer');
        setInterval(() => {
            count = count <= 0 ? 30 : count - 1;
            timerElement.innerText = `남은 시간 00:${count < 10 ? '0' + count : count}`;
        }, 1000);
    </script>

</body>
</html>
