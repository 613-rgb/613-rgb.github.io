    <style>
        /* 기본 설정 */

            margin: 0;

            margin-bottom: 20px;
        }

        .university-name {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .profile-section {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* 사진 들어갈 자리 */
        .photo-box {
            width: 100px;
            height: 130px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            overflow: hidden;
        }

        .info-box h2 {
            margin: 0;
            font-size: 24px;
            margin-top: 10px;
        }

        .info-box p {
            margin: 5px 0;

        }

        /* QR 코드 영역 */
        .qr-area {
            width: 100%;
            max-width: 340px;

            padding: 30px;

            box-shadow: 0 4px 6px rgba(0,0,0,0.05);

</head>
<body>

    <div class="card">

        <div class="profile-section">
            <div class="photo-box">

        <div class="qr-mock">
            <!-- 임시 QR 이미지 -->
            <svg width="100" height="100" viewBox="0 0 24 24">
                <path d="M3 3h8v8H3zm2 2v4h4V5zm8-2h8v8h-8zm2 2v4h4V5zM3 13h8v8H3zm2 2v4h4v-4zm13-2h3v2h-3zm-3 0h2v2h-2zm3 3h3v2h-3zm-3 3h2v2h-2zm3-3h3v2h-3zm-3 0h2v2h-2z" fill="#333"/>

        <button class="refresh-btn" onclick="location.reload()">새로고침</button>
    </div>

    <script>
        let time = 30;
        const timerDoc = document.getElementById('timer');
        setInterval(() => {
            time--;
            if(time < 0) time = 30;
            timerDoc.innerText = `남은 시간 00:${time < 10 ? '0'+time : time}`;
        }, 1000);
    </script>
